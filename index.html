<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="glass-nav">
        <div class="logo">StudySpace</div>
        <ul class="nav-links">
            <li><a href="#">Planner</a></li>
            
            <li class="bg-control">
                <button id="bgMenuBtn" class="upload-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Background
                </button>
                
                <div id="bgDropdown" class="dropdown-menu">
                    <button id="triggerUpload" class="dropdown-item">Upload Image</button>
                    <button id="removeBgBtn" class="dropdown-item text-danger">Remove Image</button>
                </div>
                
                <input type="file" id="bgUpload" accept="image/*" style="display: none;">
            </li>
        </ul>
    </nav>

    <main class="glass-dashboard">
    <header class="dashboard-header">
        <div class="progress-widget">
            <svg class="progress-ring" width="120" height="120">
                <circle class="progress-ring__bg" stroke="rgba(0,0,0,0.05)" stroke-width="12" fill="transparent" r="50" cx="60" cy="60"/>
                <circle class="progress-ring__fill" stroke="#4caf50" stroke-width="12" stroke-linecap="round" fill="transparent" r="50" cx="60" cy="60"/>
            </svg>
            <div class="progress-content">
                <span id="progress-percent">0%</span>
                <p id="progress-stat">0 of 0</p>
            </div>
        </div>
        <h2 class="dashboard-title">Today's Focus</h2>
    </header>
    
    <div class="task-input-area">
        <input type="text" id="taskInput" placeholder="What are we studying today?">
        <button id="addTaskBtn">Add</button>
    </div>
    <ul id="taskList" class="task-list"></ul>
    </main>

    <script src="app.js"></script>
</body>
</html>
